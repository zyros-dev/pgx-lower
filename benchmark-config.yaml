containers:
  dev:
    name: "pgx-lower-dev"
    port: 54320

  benchmark:
    name: "pgx-lower-benchmark"
    port: 54322

  host-profile:
    name: "host-native-profile"
    port: 54325

profiles:
  quick:
    runs:
      - container: benchmark
        scale_factor: 0.01
        iterations: 1
        profile: false
        heap: false
        indexes: false
        skipped_queries: ""

      - container: host-profile
        scale_factor: 0.01
        iterations: 1
        profile: true
        heap: true
        indexes: false
        skipped_queries: ""

      - container: dev
        scale_factor: 0.01
        iterations: 1
        profile: false
        heap: false
        indexes: false
        skipped_queries: ""

  profile:
    runs:
      - container: host-profile
        scale_factor: 0.01
        iterations: 1
        profile: true
        heap: true
        indexes: false
        skipped_queries: ""

      - container: host-profile
        scale_factor: 0.03
        iterations: 1
        profile: true
        heap: true
        indexes: false
        skipped_queries: ""

      - container: host-profile
        scale_factor: 0.05
        iterations: 1
        profile: true
        heap: true
        indexes: false
        skipped_queries: ""

  profile2:
    runs:
      - container: host-profile
        scale_factor: 0.01
        iterations: 1
        profile: true
        heap: true
        indexes: false
        skipped_queries: ""

      - container: host-profile
        scale_factor: 0.01
        iterations: 1
        profile: true
        heap: true
        indexes: true
        skipped_queries: ""

      - container: host-profile
        scale_factor: 0.16
        iterations: 1
        profile: true
        heap: true
        indexes: true
        skipped_queries: ""

  branch-prediction:
    description: "Measure branch prediction and LLC miss rates with debug symbols"
    runs:
      - container: host-profile
        scale_factor: 0.01
        iterations: 100
        profile: false
        heap: false
        indexes: true
        skipped_queries: ""
        perf_stats: true
        label: "SF=0.01, perf stats - branch/LLC analysis, 10 iterations"

      - container: host-profile
        scale_factor: 1
        iterations: 100
        profile: false
        heap: false
        indexes: true
        skipped_queries: "q02,q17,q20,q21"
        perf_stats: true
        label: "SF=1, perf stats - branch/LLC analysis, excluding {q02,q17,q20,q21}, 10 iterations"

  full:
    runs:
      - container: benchmark
        scale_factor: 0.01
        iterations: 5
        profile: false
        heap: false
        indexes: false
        skipped_queries: ""
        label: "SF=0.01, indexes disabled, 5 iterations"

      - container: benchmark
        scale_factor: 0.01
        iterations: 100
        profile: false
        heap: false
        indexes: false
        skipped_queries: "q07,q20"
        label: "SF=0.01, indexes disabled - excluding postgres {q07,q20}, 100 iterations"

      - container: benchmark
        scale_factor: 0.01
        iterations: 100
        profile: false
        heap: false
        indexes: true
        skipped_queries: ""
        label: "SF=0.01, indexes enabled, 100 iterations"

      - container: benchmark
        scale_factor: 0.16
        iterations: 5
        profile: false
        heap: false
        indexes: true
        skipped_queries: ""
        label: "SF=0.16, indexes enabled, 5 iterations"

      - container: benchmark
        scale_factor: 0.16
        iterations: 100
        profile: false
        heap: false
        indexes: true
        skipped_queries: "q17,q20"
        label: "SF=0.16, indexes enabled, excluding {q17,q20}, 100 iterations"

      - container: benchmark
        scale_factor: 1
        iterations: 100
        profile: false
        heap: false
        indexes: false
        skipped_queries: "q02,q17,q20,q21"
        label: "SF=1, indexes disabled, excluding {q02,q17,q20,q21}, 100 iterations"


environment:
  PYTHONUNBUFFERED: "1"

validation:
  check_containers: true
  check_postgres: true
  check_python_deps: true
